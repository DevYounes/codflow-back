services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: codflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-codflow}
      POSTGRES_USER: ${DB_USERNAME:-codflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-codflow} -d ${DB_NAME:-codflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codflow-net

  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codflow-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-codflow}
      DB_USERNAME: ${DB_USERNAME:-codflow}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      OZON_CUSTOMER_ID: ${OZON_CUSTOMER_ID:-}
      OZON_API_KEY: ${OZON_API_KEY:-}
      OZON_BASE_URL: ${OZON_BASE_URL:-https://api.ozonexpress.ma}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - codflow-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Nginx (reverse proxy + frontend) ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: codflow-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/frontend:/usr/share/nginx/html:ro      # React build output
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks:
      - codflow-net

  # ── Certbot (SSL Let's Encrypt) ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: codflow-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  certbot_www:
  certbot_conf:

networks:
  codflow-net:
    driver: bridge
