spring:
  application:
    name: codflow-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/codflow}
    username: ${DB_USERNAME:codflow}
    password: ${DB_PASSWORD:codflow}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

  cache:
    type: simple

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET:codflow-super-secret-key-must-be-at-least-32-characters-long-for-hs256}
    expiration-ms: ${JWT_EXPIRATION:3600000}          # 1h  (access token — court)
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}   # 7 jours (expiration absolue refresh token)
    inactivity-timeout-ms: ${JWT_INACTIVITY_TIMEOUT:28800000}    # 8h  (fenêtre d'inactivité)

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200,http://localhost:3000}

  castello:
    # Clé API utilisée par le site vitrine CASTELLO (Next.js) pour
    # appeler les endpoints publics /api/v1/public/**.
    # À définir en production via la variable d'env CASTELLO_API_KEY.
    # Si vide, les endpoints publics renvoient 503.
    api-key: ${CASTELLO_API_KEY:}

  frontend:
    url: ${FRONTEND_URL:http://localhost:4200}

  backend:
    url: ${BACKEND_URL:http://localhost:8080}

  delivery:
    sync-interval-ms: ${DELIVERY_SYNC_INTERVAL:300000}  # 5 minutes

  shopify:
    sync-interval-ms: ${SHOPIFY_SYNC_INTERVAL:300000}   # 5 minutes

  ozon:
    customer-id: ${OZON_CUSTOMER_ID:79869}
    api-key: ${OZON_API_KEY:f3bc07-5c9f5d-dc0997-6124e0-5b53e0}
    api-base-url: ${OZON_BASE_URL:https://api.ozonexpress.ma}

  stock:
    alert-check-interval-ms: ${STOCK_ALERT_CHECK_INTERVAL:3600000}  # 1 hour

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.codflow: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
